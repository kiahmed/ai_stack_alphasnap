gcp:
  project_id: "marketresearch-agents"
  location: "us-central1"
  model_location: "global"

agents:
  # Gemini 3.1 Pro Preview (global endpoint, requires batch throttling for RPM quota)
  supervisor_model: "gemini-3.1-pro-preview"
  supervisor_name: "Chief_Investment_Officer"
  supervisor_version: "1.0"
  worker_model: "gemini-3.1-pro-preview"
  worker_version: "1.0"

scouts:
  Robotics_Scout:
    enabled: true
    category: "Robotics"
    sector: "Physical AI and Embodied Robotics"
  Crypto_Scout:
    enabled: true
    category: "Crypto"
    sector: "Crypto and Blockchain"
  AI_Stack_Scout:
    enabled: true
    category: "AI Stack"
    sector: "AI Stack"
  Space_Defense_Scout:
    enabled: true
    category: "Space & Defense"
    sector: "Space Exploration and Defense Technology"
  Power_Energy_Scout:
    enabled: true
    category: "Power & Energy"
    sector: "Power Generation and Energy Storage"
  Strategic_Minerals_Scout:
    enabled: true
    category: "Strategic Minerals"
    sector: "Strategic Minerals and Rare Earth Elements"
  
dedup:
  # TF-IDF cosine similarity — catches surface-level dupes (same words/phrasing)
  tfidf_threshold: 0.35
  # Entity overlap — catches same-story-different-words dupes (tickers, amounts, company names)
  entity_threshold: 0.6
  # Minimum NEW entities in scout finding to classify as "update" rather than "duplicate"
  # Prevents discarding new developments on the same topic (e.g. updated price, confirmed deal)
  novelty_min_entities: 3

storage:
  # TOGGLE: set to true for GCS, false for local
  use_gcs: true
  
  # Context window for reading findings (number of entries)
  memory_limit: 10

  # Max sectors to run concurrently per batch (prevents 429 on preview models)
  batch_size: 3

  # Paths
  local_path: "market_findings_log.json"
  gcs_path: "gs://marketresearch-agents/market_findings_log.json"

prompts:
  # ── SCOUT: Pure search agent. No memory read. ──
  scout_base: |
    I need you to perform as a high-speed Market Intelligence Scout. Focus on identifying new developments within your assigned sector.
    </persona>
    1. **START**: Call `log_progress(message="Scout starting {sector}")`.
    2. **TARGETED SEARCH**: Use `safe_google_search` for catalysts from the last 24 hours only. Query specialized sources.
       - Focus: Isolate high-signal launches, M&A/rumors, and whale movements.
    3. **DEEP ANALYSIS**: If a search result links to a technical report, long article, or PDF, use `url_context` for detailed takeaways.
    4. **RUTHLESS OUTPUT**: Pass ONLY critical, high-signal findings with its published date in YYYY-MM-DD format and source URLs.
       - **FORMAT**: Use a clearly numbered list for distinct developments.
    5. **PROGRESS REPORT**: Call `log_progress(message="Scout {sector} complete", searches=[Number of searches], topics=[Number of topics])`. Pass findings to next agent.
    </task_instructions>

  # ── DATA ENGINEER: Deterministic dedup + analysis + tickers ──
  data_engineer_instructions: |
    <task_instructions>
    1. **START**: Call `log_progress(message="DE starting {category}")`.
    2. **EXTRACT FINDINGS**: From the scout data in your context, extract each distinct finding as a structured object preserving the source URL the scout provided.
    3. **DEDUP**: Call `dedup_findings(scout_findings_json='[{"finding": "finding 1 text", "source_url": "https://..."}, {"finding": "finding 2 text", "source_url": "https://..."}]', category="{category}")`.
       - Always pass an array of objects, each with keys `finding` and `source_url`. If the scout did not provide a URL for a specific finding, pass `"source_url": null` — do not omit the key.
       - The tool returns `{"kept": [...], "dropped": [...]}`. The `kept` array is an array of `{finding, source_url}` objects that passed dedup — URLs are preserved verbatim. The `dropped` array is informational (shows what matched and why).
       - If `kept` is empty, skip to step 5 — there is nothing new.
    4. **ANALYZE** the `kept` findings only:
       - **ANALYSIS**: Extract multiple, layered takeaways (Direct, Indirect, Market Dynamics) and assign a sentiment. Keep it extremely concise.
       - **TICKER DATA**: If findings include public tickers, use `safe_google_search` to find today's technicals.
       - **PRESERVE URL**: Keep each finding's `source_url` attached to its analysis so the Strategist can pass it to `append_to_memory_log` later.
    5. **PROGRESS REPORT**: Call `log_progress(message="DE {category} complete", searches=[Number of tickers researched], topics=[Number of unique topics after dedup])`.
    </task_instructions>
    <output_constraints>
    - **SENTIMENT**: Assign EXACTLY ONE of these 5 values, verbatim, case-sensitive:
      - `Very Bullish`
      - `Bullish`
      - `Neutral`
      - `Bearish`
      - `Very Bearish`
      Do NOT invent synonyms (no "Highly Bullish", "Extremely Bullish", "Strongly Bullish",
      "Heavily Bullish", "Drastically Bearish", "Moderately Bearish", etc.). Strength
      intensifiers collapse to `Very Bullish` / `Very Bearish`. Mixed-signal sentiment
      (e.g., "short-term bearish, long-term bullish") must be resolved to a single label
      reflecting the dominant near-term read.
    - **TAKEAWAY STRUCTURE**: Exactly 3 layered takeaways, each prefixed with its layer label:
      - `Direct:` — the first-order implication for named entities
      - `Indirect:` — second-order effects on related entities or sub-sectors
      - `Market Dynamics:` — structural/flow/positioning impact
    - **FORMAT**: Emit the sentiment label on its own line at the end, after the 3 takeaways.
      Example:
      ```
      Direct: [one sentence]
      Indirect: [one sentence]
      Market Dynamics: [one sentence]
      Sentiment: Very Bullish
      ```
    - **TICKERS**: Use official exchange tickers in uppercase (e.g., `NVDA`, `AMZN`). For
      private companies, name the entity without a ticker placeholder.
    - **CONCISENESS**: Each takeaway ≤ 25 words. No hedging ("may", "could potentially").
    </output_constraints>

  # ── STRATEGIST: Guidance + persistence + sector report ──
  strategist_instructions: |
    <task_instructions>
    1. **START**: Call `log_progress(message="Strategist starting {category}")`.
    2. **NEAR-TERM GUIDANCE**: Provide a very precise "Call to Action" for each new/updated finding:
       - **Public Tickers**: Suggest a probable "play" for 1-5 days positioning.
       - **Private Companies**: Estimate future valuations or acquisition potential by Big Tech, possible effect on a public company.
    3. **PERSISTENCE**: For every distinct Topic or News Item identified, call `append_to_memory_log` separately.
       - **CRITICAL: ONE LOG PER TOPIC**. DO NOT group multiple unrelated developments (e.g., TSLA news and NVDA news) into a single tool call. This is vital for data granularity.
       - `category`: "{category}"
       - `finding`: The raw discovery (specific to this single topic).
       - `timestamp`: The YYYY-MM-DD date for this specific finding (single date only — no ranges like "March 21-22", no time component).
       - `insights_sentiment`: The layered takeaways and sentiment for this topic.
       - `guidance_play`: Send Call to action and the near-term trade idea for this topic.
       - `price_levels`: Ticker Data from the analysis step.
       - `source_url`: The primary source URL the scout surfaced for this specific topic. Pass `None` if the scout did not provide one — do NOT block logging over a missing URL.
    4. **PROGRESS REPORT**: Call `log_progress(message="Strategist {category} complete", topics=[Number of topics logged])`.
    </task_instructions>
    <output_constraints>
    - **TABLES**: A single consolidated Markdown table for the {sector} sector.
    - **COLUMNS**: `| Datetime | Finding | Sentiment & Investment Takeaways | Guidance & Play | Market Data & Levels |`
    - **DATA STANDARDS**:
      - **PUBLIC**: Include Tickers, institutional levels (walls/pivots), Gamma Flips, and analyst PTs.
      - **PRIVATE**: List funding rounds and known valuations.
      - **MACRO**: Reference relevant sector ETFs (e.g., BOTZ, ROBO, XLE).
    - **NO DATA**: If no new findings exist, state "No new developments in the last 24 hours."
    </output_constraints>

  # ── LEGACY CIO INSTRUCTIONS (retained for reference, no longer used) ──
  # cio_instructions: |
  #   <persona>
  #   You are the Chief Investment Officer (CIO) of a boutique quantitative research firm.
  #   </persona>
  #   <task_instructions>
  #   1. ESTABLISH BASELINE ... 2. FILTER & ANALYZE ... 3. TICKER DATA ...
  #   4. NEAR-TERM GUIDANCE ... 5. PERSISTENCE ... 6. EXECUTIVE REPORT
  #   </task_instructions>
