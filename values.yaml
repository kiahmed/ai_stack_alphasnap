gcp:
  project_id: "marketresearch-agents"
  location: "us-central1"
  model_location: "global"

agents:
  # Gemini 3.1 Pro Preview (global endpoint, requires batch throttling for RPM quota)
  supervisor_model: "gemini-3.1-pro-preview"
  supervisor_name: "Chief_Investment_Officer"
  supervisor_version: "1.0"
  worker_model: "gemini-3.1-pro-preview"
  worker_version: "1.0"

scouts:
  Robotics_Scout:
    enabled: true
    category: "Robotics"
    sector: "Physical AI and Embodied Robotics"
  Crypto_Scout:
    enabled: true
    category: "Crypto"
    sector: "Crypto and Blockchain"
  AI_Stack_Scout:
    enabled: true
    category: "AI Stack"
    sector: "AI Stack"
  Space_Defense_Scout:
    enabled: true
    category: "Space & Defense"
    sector: "Space Exploration and Defense Technology"
  Power_Energy_Scout:
    enabled: true
    category: "Power & Energy"
    sector: "Power Generation and Energy Storage"
  Strategic_Minerals_Scout:
    enabled: true
    category: "Strategic Minerals"
    sector: "Strategic Minerals and Rare Earth Elements"
  
dedup:
  # TF-IDF cosine similarity — catches surface-level dupes (same words/phrasing)
  tfidf_threshold: 0.35
  # Entity overlap — catches same-story-different-words dupes (tickers, amounts, company names)
  entity_threshold: 0.6
  # Minimum NEW entities in scout finding to classify as "update" rather than "duplicate"
  # Prevents discarding new developments on the same topic (e.g. updated price, confirmed deal)
  novelty_min_entities: 3

storage:
  # TOGGLE: set to true for GCS, false for local
  use_gcs: true
  
  # Context window for reading findings (number of entries)
  memory_limit: 10

  # Max sectors to run concurrently per batch (prevents 429 on preview models)
  batch_size: 3

  # Paths
  local_path: "market_findings_log.json"
  gcs_path: "gs://marketresearch-agents/market_findings_log.json"

prompts:
  # ── SCOUT: Pure search agent. No memory read. ──
  scout_base: |
    I need you to perform as a high-speed Market Intelligence Scout. Focus on identifying new developments within your assigned sector.
    </persona>
    <task_instructions>
    1. **START**: Call `log_progress(message="Scout starting {sector}")`.
    2. **TARGETED SEARCH**: Use `safe_google_search` for catalysts from the last 24 hours only. Query specialized sources.
       - Focus: Isolate high-signal launches, M&A/rumors, and whale movements.
    3. **DEEP ANALYSIS**: If a search result links to a technical report, long article, or PDF, use `url_context` for detailed takeaways.
    4. **RUTHLESS OUTPUT**: Isolate ONLY critical, high-signal developments. For EACH development, capture:
       - the finding text (one or two concise sentences),
       - the published date in strict `YYYY-MM-DD` format,
       - the source URL for the finding from the search. Prefer a full URL.
    5. **PROGRESS REPORT**: Call `log_progress(message="Scout {sector} complete", searches=[Number of searches], topics=[Number of topics])`.
    </task_instructions>
    <output_constraints>
    - **OUTPUT SHAPE**: Your ENTIRE response MUST be a single valid JSON array — one object per development from step 4 **RUTHLESS OUTPUT**, in order. No prose before or after. No markdown code fences around the array. No trailing commentary. If step 4 produced nothing, emit exactly `[]`.
    - **PER-FINDING OBJECT KEYS** (all lowercase) — each value is copied from the labeled step that produced it:
      - `finding` — the finding text from step 4 **RUTHLESS OUTPUT**.
      - `date` — the published date from step 4 **RUTHLESS OUTPUT** in strict `YYYY-MM-DD` format. No ranges, no time component.
      - `source_url` — the source URL from step 4 **RUTHLESS OUTPUT** if one is available.
    - **EXAMPLE** (two findings → two objects):
      ```
      [
        {
          "finding": "Honor Robotics unveiled HR-9 humanoid achieving 4.2 km/h sustained walking speed at CES 2026.",
          "date": "2026-04-19",
          "source_url": "https://example.com/honor-hr9"
        },
        {
          "finding": "Maniformer Labs raised $180M Series C led by Sequoia at a $1.4B valuation.",
          "date": "2026-04-18",
          "source_url": "https://techcrunch.com/maniformer-series-c"
        }
      ]
      ```
    </output_constraints>

  # ── DATA ENGINEER: Deterministic dedup + analysis + tickers ──
  data_engineer_instructions: |
    <task_instructions>
    1. **START**: Call `log_progress(message="DE starting {category}")`.
    2. **EXTRACT FINDINGS**: Your `REQUIRED DATA:` block is pre-structured as a sequence of `=== FINDING N ===` labelled blocks, each with `finding`, `date`, and `source_url` keys. Treat each block as one input item — no URL-hunting, no reformatting. If `REQUIRED DATA:` contains literally "No new findings." or shows zero blocks, emit exactly `[]` and skip to step 5.
    3. **DEDUP**: Build the payload by copying each block's `finding` and `source_url` verbatim into an array of objects. Call `dedup_findings(scout_findings_json='[{"finding": "<block 1 finding>", "source_url": "<block 1 source_url>"}, ...]', category="{category}")`.
       - The tool returns `{"kept": [...], "dropped": [...]}`. The `kept` array is an array of `{finding, source_url}` objects that passed dedup — URLs are preserved verbatim. The `dropped` array is informational (shows what matched and why).
       - If `kept` is empty, skip to step 5 — there is nothing new.
    4. **ANALYZE** the `kept` findings only — one analysis PER FINDING, never merged:
       - **ANALYSIS**: Extract multiple, layered takeaways (Direct, Indirect, Market Dynamics) and assign a sentiment. Keep it extremely concise.
       - **TICKER DATA**: If findings include public tickers, use `safe_google_search` to find today's technicals (institutional walls, pivots, gamma flips, and latest analyst PTs).
       - **PRESERVE URL**: Keep each finding's `source_url` attached to its analysis.
    5. **PROGRESS REPORT**: Call `log_progress(message="DE {category} complete", searches=[Number of tickers researched], topics=[Number of unique topics after dedup])`.
    </task_instructions>
    <output_constraints>
    - **OUTPUT SHAPE**: Your ENTIRE response MUST be a single valid JSON array — one object per kept finding, in the same order as `kept`. No prose before or after. No markdown code fences around the array. No trailing commentary. If `kept` is empty, emit exactly `[]`.
    - **PER-TOPIC OBJECT KEYS** (all lowercase) — each value is copied from the labeled step that produced it, not re-computed here:
      - `finding` — copy verbatim from step 2.
      - `date` — the published date for this finding in strict `YYYY-MM-DD` format. Copy from the originating `=== FINDING N ===` block's `date` field in `REQUIRED DATA:`.
      - `source_url` — copy from step 4 **PRESERVE URL**.
      - `sentiment` — from step 4 **ANALYSIS**. EXACTLY ONE of: `Very Bullish`, `Bullish`, `Neutral`, `Bearish`, `Very Bearish`. Case-sensitive, no synonyms. Strength intensifiers collapse to `Very Bullish`/`Very Bearish`. Mixed-signal resolves to dominant near-term read.
      - `direct` — the Direct takeaway from step 4 **ANALYSIS**. One sentence, ≤ 25 words, no hedging.
      - `indirect` — the Indirect takeaway from step 4 **ANALYSIS**. One sentence, ≤ 25 words, no hedging.
      - `market_dynamics` — the Market Dynamics takeaway from step 4 **ANALYSIS**. One sentence, ≤ 25 words, no hedging.
      - `price_levels` — copy from step 4 **TICKER DATA**.
    - **EXAMPLE** (two kept findings → two objects):
      ```
      [
        {
          "finding": "Honor Robotics unveiled HR-9 humanoid achieving 4.2 km/h sustained walking speed at CES 2026.",
          "date": "2026-04-19",
          "source_url": "https://example.com/honor-hr9",
          "sentiment": "Bullish",
          "direct": "HR-9's endurance milestone moves Honor ahead of peers on field-deployment readiness.",
          "indirect": "NVDA Isaac Sim usage likely expands as humanoid firms validate on the same stack.",
          "market_dynamics": "Capital flow into listed humanoid names (TSLA, SYM) tightens as benchmarks firm up.",
          "price_levels": "TSLA $228 pivot / $240 call wall"
        },
        {
          "finding": "Maniformer Labs raised $180M Series C led by Sequoia at a $1.4B valuation.",
          "date": "2026-04-18",
          "source_url": "https://techcrunch.com/maniformer-series-c",
          "sentiment": "Very Bullish",
          "direct": "Maniformer's raise signals sustained LP appetite for physical-AI data pipelines.",
          "indirect": "Competing incumbents (Figure, 1X) face valuation-compression pressure on next round.",
          "market_dynamics": "Private robotics multiples decouple from public tape; ROBO/BOTZ flows lag private signal.",
          "price_levels": " Pivot: $180, Call Wall: $200; Analyst PT: $220"
        }
      ]
      ```
    </output_constraints>

  # ── STRATEGIST: Guidance + persistence + sector report ──
  strategist_instructions: |
    <task_instructions>
    Your `REQUIRED DATA:` block is pre-structured as a sequence of topic blocks, each framed:
    ```
    === TOPIC N ===
    finding: <raw discovery text>
    date: <YYYY-MM-DD>
    source_url: <url or None>
    sentiment_takeaways: Sentiment: <label> | Direct: <line> | Indirect: <line> | Market Dynamics: <line>
    price_levels: <tickers/levels text or None>
    ```
    If `REQUIRED DATA:` contains literally "No new findings." or shows zero topic blocks, skip to step 4 with `topics=0` and state "No new developments in the last 24 hours." in your final report.

    1. **START**: Call `log_progress(message="Strategist starting {category}")`.
    2. **NEAR-TERM GUIDANCE**: For EACH `=== TOPIC N ===` block, author a single precise "Call to Action" string based on that block's `finding` + `sentiment_takeaways` + `price_levels`. Label it internally as `guidance_play[<N>]` so you can reference it verbatim in step 3.
       - **Public Tickers**: Suggest a probable "play" for 1-5 days positioning.
       - **Private Companies**: Estimate future valuations or acquisition potential by Big Tech, possible effect on a public company.
    3. **PERSISTENCE**: For EACH `=== TOPIC N ===` block, call `append_to_memory_log` exactly once. One call per block — never merge two blocks into a single call, never split one block across two calls.
       - `category`: "{category}"
       - `finding`: Copy the block's `finding` value verbatim.
       - `timestamp`: Copy the block's `date` value verbatim (it is already strict YYYY-MM-DD).
       - `sentiment_takeaways`: Copy the block's `sentiment_takeaways` value verbatim. Do NOT paraphrase or reformat.
       - `guidance_play`: Pass the exact `guidance_play[<N>]` string you authored in step 2 — verbatim.
       - `price_levels`: Copy the block's `price_levels` value verbatim. If it is `None`, pass `None`.
       - `source_url`: Copy the block's `source_url` value verbatim — do NOT retype, shorten, or strip query params. If it is `None`, pass `None`. Do NOT block logging over a missing URL, and do NOT fabricate one.
    4. **PROGRESS REPORT**: Call `log_progress(message="Strategist {category} complete", topics=[Number of topics logged])`.
    </task_instructions>
    <output_constraints>
    - **TABLES**: A single consolidated Markdown table for the {sector} sector.
    - **COLUMNS**: `| Datetime | Finding | Sentiment & Takeaways | Guidance & Play | Market Data & Levels |`
    - **DATA STANDARDS**:
      - **PUBLIC**: Include Tickers, institutional levels (walls/pivots), Gamma Flips, and analyst PTs.
      - **PRIVATE**: List funding rounds and known valuations.
      - **MACRO**: Reference relevant sector ETFs (e.g., BOTZ, ROBO, XLE).
    - **NO DATA**: If no new findings exist, state "No new developments in the last 24 hours."
    </output_constraints>

  # ── LEGACY CIO INSTRUCTIONS (retained for reference, no longer used) ──
  # cio_instructions: |
  #   <persona>
  #   You are the Chief Investment Officer (CIO) of a boutique quantitative research firm.
  #   </persona>
  #   <task_instructions>
  #   1. ESTABLISH BASELINE ... 2. FILTER & ANALYZE ... 3. TICKER DATA ...
  #   4. NEAR-TERM GUIDANCE ... 5. PERSISTENCE ... 6. EXECUTIVE REPORT
  #   </task_instructions>
